<!DOCTYPE html>
<html>
<head>
  <title>SamNail AI Assistant</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    #chat {
      width: 520px;
      height: 420px;
      border: 1px solid #ccc;
      padding: 10px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    #msg { width: 380px; padding: 8px; }
    button { padding: 8px 14px; }
    .user, .ai { margin-bottom: 10px; }
    .products a { display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>SamNail AI Assistant</h2>

  <div id="chat"></div>

  <input id="msg" placeholder="Ask about nail products..." />
  <button onclick="send()">Send</button>

  <script>
    const SERVER_URL = "https://samnail-ai-production.up.railway.app/api/chat";

    async function send() {
      const input = document.getElementById("msg");
      const chat = document.getElementById("chat");
      const message = input.value.trim();

      if (!message) return;

      chat.innerHTML += `<div class="user"><strong>You:</strong> ${message}</div>`;
      input.value = "";

      try {
        const response = await fetch(SERVER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        let html = `<div class="ai"><strong>AI:</strong><br>${(data.reply || "").replace(/\n/g, "<br>")}</div>`;

        if (data.products && data.products.length) {
          html += `<div class="products"><strong>Products:</strong>`;
          data.products.forEach((p) => {
            html += `<a href="${p.url}" target="_blank">${p.title}${p.price ? " - $" + p.price : ""}</a>`;
          });
          html += `</div>`;
        }

        chat.innerHTML += html;
        chat.scrollTop = chat.scrollHeight;
      } catch (error) {
        chat.innerHTML += `<div class="ai"><strong>AI:</strong> Error connecting to server.</div>`;
      }
    }
  </script>
</body>
</html>
