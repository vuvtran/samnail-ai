<!DOCTYPE html>
<html>
<head>
  <title>SamNail AI Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    #chat {
      width: 560px;
      height: 440px;
      border: 1px solid #ccc;
      padding: 12px;
      overflow-y: auto;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .user, .ai, .error {
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .products {
      margin: 8px 0 14px 0;
      padding-left: 18px;
    }

    .products li {
      margin-bottom: 6px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      width: 560px;
    }

    #msg {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>SamNail AI Assistant</h2>

  <div id="chat"></div>

  <div class="input-row">
    <input id="msg" placeholder="Ask about nail products..." />
    <button onclick="send()">Send</button>
  </div>

  <script>
    const SERVER_URL = "https://samnail-ai-production.up.railway.app/api/chat";

    async function send() {
      const input = document.getElementById("msg");
      const chat = document.getElementById("chat");
      const message = input.value.trim();

      if (!message) return;

      chat.innerHTML += `<div class="user"><strong>You:</strong> ${message}</div>`;
      chat.scrollTop = chat.scrollHeight;
      input.value = "";

      try {
        const response = await fetch(SERVER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || data.error || `HTTP ${response.status}`);
        }

        chat.innerHTML += `<div class="ai"><strong>AI:</strong><br>${(data.reply || "").replace(/\n/g, "<br>")}</div>`;

        if (data.products && data.products.length) {
          let html = `<ul class="products">`;
          data.products.forEach((p) => {
            html += `<li><a href="${p.url}" target="_blank">${p.title}</a>${p.price ? ` - $${p.price}` : ""}</li>`;
          });
          html += `</ul>`;
          chat.innerHTML += html;
        }

        chat.scrollTop = chat.scrollHeight;
      } catch (error) {
        console.error(error);
        chat.innerHTML += `<div class="error"><strong>AI:</strong> ${error.message}</div>`;
        chat.scrollTop = chat.scrollHeight;
      }
    }

    document.getElementById("msg").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        send();
      }
    });
  </script>
</body>
</html>
