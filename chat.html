<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SamNail AI Support</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 {
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      font-size: 16px;
    }
    button {
      margin-top: 10px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    #reply {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>SamNail AI Support Test</h1>

  <textarea id="question" placeholder="Ask a question, e.g. Where is my order #1002?"></textarea>
  <br />
  <button onclick="askAI()">Send</button>

  <div id="reply"></div>

  <script>
    async function askAI() {
      const question = document.getElementById("question").value;
      const replyBox = document.getElementById("reply");
      replyBox.innerText = "Thinking...";

      try {
        const res = await fetch("http://localhost:3000/ai-support", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question })
        });

        const data = await res.json();
        replyBox.innerText = data.reply || JSON.stringify(data, null, 2);
      } catch (err) {
        replyBox.innerText = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
