<!DOCTYPE html>
<html>
<head>
  <title>SamNail AI Assistant</title>
  <style>
    body { font-family: Arial; margin:40px;}
    #chat {width:400px;height:400px;border:1px solid #ccc;overflow-y:auto;padding:10px;}
    #msg {width:300px;}
  </style>
</head>

<body>

<h2>SamNail AI Assistant</h2>

<div id="chat"></div>

<br>

<input id="msg" placeholder="Ask about nail products">
<button onclick="send()">Send</button>

<script>

const SERVER_URL =
"https://samnail-ai-production.up.railway.app/api/chat";

async function send(){

  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");

  const message = input.value;

  chat.innerHTML += "<div><b>You:</b> "+message+"</div>";

  const response = await fetch(SERVER_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      message:message
    })
  });

  const data = await response.json();

  chat.innerHTML += "<div><b>AI:</b> "+data.reply+"</div>";

  input.value="";
}

</script>

</body>
</html>
