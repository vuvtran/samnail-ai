<!DOCTYPE html>
<html>
<head>
  <title>SamNail AI Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    h2 {
      margin-bottom: 16px;
    }

    #chat {
      width: 520px;
      height: 420px;
      border: 1px solid #ccc;
      padding: 12px;
      overflow-y: auto;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .user, .ai, .error {
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .user strong {
      color: #111;
    }

    .ai strong {
      color: #0b57d0;
    }

    .error strong {
      color: #c62828;
    }

    .input-row {
      display: flex;
      gap: 8px;
      width: 520px;
    }

    #msg {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>SamNail AI Assistant</h2>

  <div id="chat"></div>

  <div class="input-row">
    <input id="msg" placeholder="Ask about nail products..." />
    <button onclick="send()">Send</button>
  </div>

  <script>
    const SERVER_URL = "https://samnail-ai-production.up.railway.app/api/chat";

    async function send() {
      const input = document.getElementById("msg");
      const chat = document.getElementById("chat");
      const message = input.value.trim();

      if (!message) return;

      chat.innerHTML += `<div class="user"><strong>You:</strong> ${message}</div>`;
      chat.scrollTop = chat.scrollHeight;
      input.value = "";

      try {
        const response = await fetch(SERVER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        chat.innerHTML += `<div class="ai"><strong>AI:</strong> ${data.reply || "No response"}</div>`;
        chat.scrollTop = chat.scrollHeight;
      } catch (error) {
        console.error(error);
        chat.innerHTML += `<div class="error"><strong>AI:</strong> ${error.message}</div>`;
        chat.scrollTop = chat.scrollHeight;
      }
    }

    document.getElementById("msg").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        send();
      }
    });
  </script>
</body>
</html>
